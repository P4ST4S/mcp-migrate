name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod   # pins to the version declared in go.mod

      - run: go test ./...
      - run: go build ./...

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t mcp-migrate:ci .

      - name: Smoke-test Docker image
        # The Go `flag` package exits 2 on --help; that is expected, not a crash.
        # Capture the exit code manually so set -e does not abort the step,
        # then fail on anything other than 0 or 2.
        run: |
          set +e
          docker run --rm mcp-migrate:ci analyze --help
          rc=$?
          set -e
          if [ "$rc" -ne 0 ] && [ "$rc" -ne 2 ]; then
            echo "unexpected exit code: $rc"
            exit "$rc"
          fi
