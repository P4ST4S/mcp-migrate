version: 2

project_name: mcp-migrate

builds:
  - id: mcp-migrate
    main: ./cmd/mcp-migrate
    binary: mcp-migrate
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]

checksum:
  name_template: "checksums.txt"

