version: 2

project_name: mcp-migrate

builds:
  - id: mcp-migrate
    main: ./cmd/mcp-migrate
    binary: mcp-migrate
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: mcp-migrate
    ids:
      - mcp-migrate
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    formats:
      - tar.gz
    files:
      - LICENSE
      - README.md
      - CONTRIBUTING.md

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: P4ST4S
    name: mcp-migrate
  draft: false
  prerelease: auto
